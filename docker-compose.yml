services:
  postgres:
    image: postgres:16-alpine
    container_name: spaceatracker_postgres
    environment:
      POSTGRES_USER: spaceatracker
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spaceatracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: spaceatracker_seaweedfs
    command: 'server -dir=/data -s3 -filer -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json'
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
      - ./docker/seaweedfs/s3.json:/etc/seaweedfs/s3.json
    restart: unless-stopped

  seaweedfs_init:
    image: amazon/aws-cli:latest
    container_name: spaceatracker_seaweedfs_init
    depends_on:
      - seaweedfs
    environment:
      AWS_ACCESS_KEY_ID: some_access_key
      AWS_SECRET_ACCESS_KEY: some_secret_key
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: [""]
    command: >
      bash -c "
      until aws --endpoint-url http://seaweedfs:8333 s3 ls; do
        echo 'Waiting for SeaweedFS S3 API...';
        sleep 2;
      done;
      aws --endpoint-url http://seaweedfs:8333 s3 mb s3://terminals || echo 'Bucket already exists';
      echo 'SeaweedFS initialized'
      "

volumes:
  postgres_data:
  seaweedfs_data:
